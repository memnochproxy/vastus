<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Hex Map</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #282c34;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            border: 2px solid #61dafb;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            background-color: #1e1e1e;
        }
    </style>
</head>
<body>

<canvas id="hexCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('hexCanvas');
const ctx = canvas.getContext('2d');

const hexRadius = 40;
const hexHeight = Math.sqrt(3) * hexRadius;
const hexWidth = 2 * hexRadius;
const hexSide = 3 / 2 * hexRadius;

const gridRows = 6;
const gridCols = 8;
const hexes = [];

// Calculate center points for all hexes (Flat-top layout)
for (let r = 0; r < gridRows; r++) {
    for (let c = 0; c < gridCols; c++) {
        const x = c * hexSide + hexRadius;
        const y = r * hexHeight + (c % 2 === 0 ? hexHeight / 2 : 0) + hexHeight / 2;
        hexes.push({ q: c, r: r, x: x, y: y, color: '#333344' });
    }
}

// Function to draw a single hexagon
function drawHexagon(ctx, x, y, color, isSelected) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i;
        const hx = x + hexRadius * Math.cos(angle);
        const hy = y + hexRadius * Math.sin(angle);
        if (i === 0) ctx.moveTo(hx, hy);
        else ctx.lineTo(hx, hy);
    }
    ctx.closePath();

    ctx.fillStyle = color;
    ctx.fill();

    ctx.strokeStyle = isSelected ? '#61dafb' : '#555';
    ctx.lineWidth = isSelected ? 3 : 1;
    ctx.stroke();
}

// Render loop
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const hex of hexes) {
        drawHexagon(ctx, hex.x, hex.y, hex.color, hex.isHovered);
    }
}

// Mouse movement tracker
canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    let needsRedraw = false;

    for (const hex of hexes) {
        // Calculate distance from mouse to hex center
        const dx = mouseX - hex.x;
        const dy = mouseY - hex.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        const wasHovered = hex.isHovered;
        hex.isHovered = distance < hexRadius;

        if (wasHovered !== hex.isHovered) {
            needsRedraw = true;
        }
    }

    if (needsRedraw) draw();
});

// Click interaction
canvas.addEventListener('click', (e) => {
    for (const hex of hexes) {
        if (hex.isHovered) {
            // Toggle color on click
            hex.color = hex.color === '#333344' ? '#444466' : '#333344';
            draw();
            break;
        }
    }
});

draw();
</script>

</body>
</html>
